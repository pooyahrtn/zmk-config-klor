# Uncomment these two line to add support for encoders to your firmware
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the KLOR OLED Display
# CONFIG_ZMK_DISPLAY=y

# Uncomment the following lines to enable per key RGB
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=40

# --- Power management ---
# Enable deep sleep: each half powers down to ~uA after the idle-sleep timeout,
# waking instantly on the next keypress. This is the single biggest battery win.
CONFIG_ZMK_SLEEP=y

# Go to deep sleep after 30 min idle (default is 15 min / 900000).
# Generous enough to not nap during short breaks, but powers down overnight.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000